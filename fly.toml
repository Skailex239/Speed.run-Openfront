app = "speed-run-openfront"
primary_region = "cdg"

[build]
  builder = "heroku/buildpacks:20"

[env]
  NODE_ENV = "production"
  ADMIN_PASSWORD = "SpeedrunADMINPASSWORDSkailex"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "data"
  destination = "/data"

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
